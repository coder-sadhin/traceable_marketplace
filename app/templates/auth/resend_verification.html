{% extends "base.html" %}

{% block title %}Resend Verification - Traceable Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-envelope text-indigo-600 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Resend Verification</h1>
            <p class="text-gray-500 mt-1">Enter your email to receive a new verification link</p>
        </div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>
                <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition shadow-md">
                    <i class="fas fa-paper-plane mr-2"></i> Send Verification Link
                </button>
            </div>
        </form>
        <div class="mt-4 text-center">
            <a href="{{ url_for('auth.login') }}" class="text-sm text-indigo-600 hover:underline">
                <i class="fas fa-arrow-left mr-1"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
