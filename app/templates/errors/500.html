{% extends "base.html" %}

{% block title %}Server Error - Traceable Marketplace{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="text-center max-w-md">
        <div class="w-24 h-24 bg-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-triangle text-white text-4xl"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-2">500</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Server Error</h2>
        <p class="text-gray-600 mb-8">Something went wrong on our end. Please try again later.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('main.index') }}" class="gradient-bg text-white px-8 py-3 rounded-xl font-semibold hover:opacity-90 transition shadow-lg">
                <i class="fas fa-home mr-2"></i> Go Home
            </a>
            <button onclick="location.reload()" class="bg-white border-2 border-gray-300 text-gray-700 px-8 py-3 rounded-xl font-semibold hover:bg-gray-50 transition">
                <i class="fas fa-redo mr-2"></i> Retry
            </button>
        </div>
    </div>
</div>
{% endblock %}
