{% extends "base.html" %}

{% block title %}Page Not Found - Traceable Marketplace{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="text-center max-w-md">
        <div class="w-24 h-24 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-search text-white text-4xl"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-2">404</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Page Not Found</h2>
        <p class="text-gray-600 mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('main.index') }}" class="gradient-bg text-white px-8 py-3 rounded-xl font-semibold hover:opacity-90 transition shadow-lg">
                <i class="fas fa-home mr-2"></i> Go Home
            </a>
            <a href="{{ url_for('products.browse') }}" class="bg-white border-2 border-indigo-600 text-indigo-600 px-8 py-3 rounded-xl font-semibold hover:bg-indigo-50 transition">
                <i class="fas fa-search mr-2"></i> Browse Items
            </a>
        </div>
    </div>
</div>
{% endblock %}
